services:
  # ── Backend ──────────────────────────────────────────────────────────────────
  - type: web
    name: ehrqueryengine-backend
    runtime: python
    plan: standard  # Professional plan instance
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.init_db && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 4
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DUCKDB_PATH
        value: /var/data/warehouse.duckdb
      - key: CORS_ORIGINS
        value: "*"
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: LLM_PROVIDER
        value: openai
    disk:
      name: ehrdata-storage
      mountPath: /var/data
      sizeGB: 10

  # ── Frontend ─────────────────────────────────────────────────────────────────
  - type: web
    name: ehrqueryengine-frontend
    runtime: node
    plan: standard  # Professional plan instance
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://ehrqueryengine-backend.onrender.com
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: HOSTNAME
        value: 0.0.0.0
