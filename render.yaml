services:
  # ── Backend ──────────────────────────────────────────────────────────────────
  - type: web
    name: ehrqueryengine-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python3 -m app.init_db
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DUCKDB_PATH
        value: /opt/render/project/data/warehouse.duckdb
      - key: CORS_ORIGINS
        value: https://ehrqueryengine-frontend.onrender.com
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: LLM_PROVIDER
        value: openai
    disk:
      name: data
      mountPath: /opt/render/project/data
      sizeGB: 1

  # ── Frontend ─────────────────────────────────────────────────────────────────
  - type: web
    name: ehrqueryengine-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://ehrqueryengine-backend.onrender.com
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: HOSTNAME
        value: 0.0.0.0
